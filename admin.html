<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seedora Product Manager</title>
    <link rel="icon" href="seedora-logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-header">
        <a class="brand" href="index.html" aria-label="Back to Seedora shop">
          <img class="brand-mark" src="seedora-logo.svg" alt="" />
          <span>
            <strong>Seedora</strong>
            <small>Product manager</small>
          </span>
        </a>
        <a class="secondary-action" href="index.html">Open shop</a>
      </header>

      <section class="admin-hero">
        <div>
          <p class="eyebrow">Owner tools</p>
          <h1>Manage products</h1>
          <p>Add new products, update prices, and attach product photo URLs. Saved products appear in the shop on this browser.</p>
        </div>
      </section>

      <section class="admin-layout">
        <form class="admin-form" id="productForm">
          <input type="hidden" name="id" />
          <label>
            Admin PIN
            <input name="adminPin" type="password" placeholder="Default: business phone number" required />
          </label>
          <label>
            Product name
            <input name="name" type="text" placeholder="Example: Seedora Premium Makhana" required />
          </label>
          <label>
            Category
            <select name="category" required>
              <option>Nuts</option>
              <option>Dried Fruits</option>
              <option>Seeds</option>
              <option>Mixes</option>
              <option>Gifts</option>
              <option>Laddus</option>
              <option>Spices</option>
            </select>
          </label>
          <div class="admin-two">
            <label>
              Price
              <input name="price" type="number" min="1" placeholder="299" required />
            </label>
            <label>
              MRP
              <input name="mrp" type="number" min="1" placeholder="349" required />
            </label>
          </div>
          <div class="admin-two">
            <label>
              Pack
              <input name="pack" type="text" placeholder="250 g" required />
            </label>
            <label>
              Tag
              <input name="tag" type="text" placeholder="New" required />
            </label>
          </div>
          <label>
            Description
            <textarea name="description" placeholder="Short product description for the catalog." required></textarea>
          </label>
          <label>
            Photo URL
            <input name="image" type="url" placeholder="https://example.com/product.jpg" />
          </label>
          <label>
            Benefits
            <input name="benefits" type="text" placeholder="Fresh pack, Premium quality, All India delivery" />
          </label>
          <div class="admin-actions">
            <button class="primary-action" type="submit">Save product</button>
            <button class="secondary-action" id="resetForm" type="button">Clear</button>
          </div>
          <p class="order-note" id="adminNote" role="status"></p>
        </form>

        <section class="admin-products">
          <div class="section-head">
            <div>
              <p class="eyebrow">Custom catalog</p>
              <h2>Added products</h2>
            </div>
            <button class="reset-button" id="exportProducts" type="button">Export JSON</button>
          </div>
          <div id="adminProductList" class="admin-product-list"></div>
        </section>

        <section class="admin-products">
          <div class="section-head">
            <div>
              <p class="eyebrow">Operations</p>
              <h2>Orders</h2>
            </div>
            <button class="reset-button" id="refreshOrders" type="button">Refresh</button>
          </div>
          <div id="adminOrderList" class="admin-product-list"></div>
        </section>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
