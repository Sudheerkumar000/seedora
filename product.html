<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seedora Product</title>
    <link rel="icon" href="seedora-logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=seedora-action-v1" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Seedora home">
          <img class="brand-mark" src="seedora-logo.svg" alt="" />
          <span>
            <strong>Seedora</strong>
            <small>Dry fruits, seeds and spices</small>
          </span>
        </a>
        <nav class="nav-links" aria-label="Primary">
          <a href="/#shop">Shop</a>
          <a href="/#gift">Gifts</a>
          <a href="/#plans">Plans</a>
        </nav>
        <div class="header-actions">
          <a class="icon-button" href="/#cart" aria-label="Open cart">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.3 6h15l-1.6 8.3a2 2 0 0 1-2 1.7H8a2 2 0 0 1-2-1.7L4.7 3H2" />
              <circle cx="9" cy="20" r="1.4" />
              <circle cx="18" cy="20" r="1.4" />
            </svg>
            <span id="cartCount">0</span>
          </a>
        </div>
      </header>

      <main>
        <section class="product-page">
          <a class="product-back" href="/#shop">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 12H5m7-7-7 7 7 7" />
            </svg>
            Back to products
          </a>
          <div id="productPageDetails" aria-live="polite">
            <div class="empty-results">
              <strong>Loading Seedora product...</strong>
            </div>
          </div>
          <p class="order-note" id="productPageNote" role="status"></p>
        </section>
      </main>
    </div>

    <a
      class="whatsapp-fab"
      href="https://wa.me/919704597062?text=Hello%20Seedora%2C%20I%20need%20help%20with%20products%20or%20my%20order."
      target="_blank"
      rel="noopener"
      aria-label="Chat with Seedora on WhatsApp"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20.5 11.8a8.5 8.5 0 0 1-12.6 7.4L4 20.2l1-3.8a8.5 8.5 0 1 1 15.5-4.6Z" />
        <path d="M8.9 8.8c.2 3.2 2.2 5.4 5.3 6.2l1.3-1.3c.2-.2.5-.3.8-.2l2 .5" />
      </svg>
      <span>WhatsApp</span>
    </a>

    <script src="product-page.js?v=seedora-action-v1"></script>
  </body>
</html>
